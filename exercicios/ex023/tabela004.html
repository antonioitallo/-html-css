<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Completa</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-image: linear-gradient(to right , rgba(0, 0, 255, 0.368) , pink);
        }
        main {
            margin: -10px auto;
            width: 50vw;
            height: 680px;
            background-color: white;
            border-radius: 0px 0px 20px 20px;
            box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.188);
        }
        td.filme::before {
            content: '\1F3A5';
        }
        h1 {
            padding: 50px 0px;
            margin:auto;
            text-align: center;
        }
        table {
            margin: auto;
            border: 1px solid black;
            border-collapse: collapse;
            width: 100vh;
        }
        thead {
            background-color: gray;
        }
        td , th  {
            text-align: center;
            border: 1px solid black;
            padding: 3px;
        }
        th.titulo {
            width: 100px;
        }
        .mulher {
            background-color: pink;
            
        }
        th.mulher {
            color: black;
        }
        td.mulher {
            color: white;
        }
        .homem {
            background-color: rgba(48, 48, 255, 0.508);
        }
        td.homem {
            color: white;
        }
        .filme {
            background-color: rgba(128, 128, 128, 0.449);
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <h1>Tabela </h1>
        <table>
            <thead>
                <tr>
                    <th scope="col">Grupo</th>
                    <th scope="col">Nomes</th>
                    <th colspan="3" scope="colgroup">Filmes</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th scope="rowgroup" class="titulo mulher"rowspan="3">Mulheres</th>
                    <td class="mulher">Ana Maria Santos</td>
                    <td class="filme">Alien</td>
                    <td class="filme">Rambo</td>
                    <td class="filme">Vingadores</td>
                </tr>
                <tr>
                    <td  class="mulher">Beatriz Sousa</td>
                    <td class="filme">Hulk</td>
                    <td class="filme">Inception</td>
                    <td class="filme">Batman</td>
                </tr>
                <tr>
                    <td  class="mulher">Cláudia Melo</td>
                    <td class="filme">Oblivion</td>
                    <td class="filme">Matrix</td>
                    <td class="filme">Big Hero</td>
                </tr>
                <tr>
                    <th scope="rowgroup" rowspan="3" class="homem">Homens</th>
                    <td class="homem">Bruno Mendonça</td>
                    <td class="filme">Intocáveis</td>
                    <td class="filme">Amnésia</td>
                    <td class="filme">Gladiador</td>
                </tr>
                <tr>
                    <td class="homem">Daniel Lourenço</td>
                    <td class="filme">Wall-E</td>
                    <td class="filme">Oldboy</td>
                    <td class="filme">Dangal</td>
                </tr>
                <tr>
                    <td class="homem">Fabiano Mota</td>
                    <td class="filme">Star Wars 5 </td>
                    <td class="filme">Taxi Driver</td>
                    <td class="filme">Toy Story</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
