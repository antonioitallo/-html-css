<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicos de Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 500px;
            border-collapse: collapse;
        }
        caption {
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }
        th , td {
            border: 1px solid black;
            padding: 8px;
        }
        .destaque {
            background-color: cadetblue;
        }
        col.cnome {
            background-color: aqua;
        }
    </style>
</head>
<body>
    <h1>Exercicio de Tabelas</h1>
    <table>
        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprof">
        </colgroup>
        <caption>
            Cadastro
        </caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Pedro Scobar</td>
            <td>M</td>
            <td>55</td>
            <td>Vaqueiro</td>
        </tr>
        <tr>
            <td>Foguete</td>
            <td>F</td>
            <td>19</td>
            <td>Biomedica</td>
        </tr>
        <tr>
            <td>Jucie</td>
            <td>M</td>
            <td>22</td>
            <td>Vendedor de carne</td>
        </tr>
        <tr>
            <td>Andre</td>
            <td>M</td>
            <td>41</td>
            <td>Sacoleiro</td>
        </tr>
        <tr>
            <td>Maria Antonia</td>
            <td>F</td>
            <td>28</td>
            <td>Sacoleira</td>
        </tr>
    </table>
</body>
</html>
